# Optional manual deploy via SSH (often blocked from GitHub → Hostinger on port 22).
# Use workflow_dispatch only if your VPS accepts SSH from GitHub Actions.

name: Deploy to VPS (SSH — manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare connection settings
        env:
          RAW_HOST: ${{ secrets.VPS_HOST }}
          RAW_PORT: ${{ secrets.VPS_PORT }}
        run: |
          HOST="${RAW_HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          PORT="${RAW_PORT:-22}"
          echo "HOST=$HOST" >> "$GITHUB_ENV"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          if [ -z "$HOST" ]; then
            echo "::error::VPS_HOST secret is missing or empty"
            exit 1
          fi

      - name: Write SSH key
        env:
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          KEY_FILE="${GITHUB_WORKSPACE}/deploy_key"
          if [ -n "$SSH_KEY_B64" ]; then
            echo "$SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          elif [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > "$KEY_FILE"
          else
            echo "::error::Missing secret: set SSH_KEY_B64 or VPS_SSH_KEY"
            exit 1
          fi
          chmod 600 "$KEY_FILE"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_URL: http://${{ env.HOST }}:5174
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ github.workspace }}/deploy_key
          port: ${{ env.PORT }}
          timeout: 180s
          command_timeout: 30m
          envs: MYSQL_ROOT_PASSWORD,MYSQL_PASSWORD,AUTH_SECRET,APP_URL,ENV_FILE_B64,VPS_APP_DIR
          script: |
            set -e
            APP_DIR="${VPS_APP_DIR:-/home/container/Next-Gamifikasi}"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
