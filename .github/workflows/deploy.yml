name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare connection settings
        env:
          RAW_HOST: ${{ secrets.VPS_HOST }}
          RAW_PORT: ${{ secrets.VPS_PORT }}
        run: |
          HOST="${RAW_HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          PORT="${RAW_PORT:-22}"
          echo "HOST=$HOST" >> "$GITHUB_ENV"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          if [ -z "$HOST" ]; then
            echo "::error::VPS_HOST secret is missing or empty"
            exit 1
          fi

      - name: Check SSH port reachable
        run: |
          echo "Testing SSH to $HOST:$PORT ..."
          for i in 1 2 3; do
            if nc -zv -w 15 "$HOST" "$PORT"; then
              echo "SSH port is reachable"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::Cannot reach $HOST:$PORT from GitHub Actions."
          echo "::error::Open TCP port $PORT in Hostinger hPanel firewall and on the VPS (ufw allow $PORT/tcp)."
          exit 1

      - name: Write SSH key
        env:
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          KEY_FILE="${GITHUB_WORKSPACE}/deploy_key"
          if [ -n "$SSH_KEY_B64" ]; then
            echo "$SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          elif [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > "$KEY_FILE"
          else
            echo "::error::Missing secret: set SSH_KEY_B64 or VPS_SSH_KEY"
            exit 1
          fi
          chmod 600 "$KEY_FILE"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_URL: http://${{ env.HOST }}:5174
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ github.workspace }}/deploy_key
          port: ${{ env.PORT }}
          timeout: 120s
          command_timeout: 30m
          envs: MYSQL_ROOT_PASSWORD,MYSQL_PASSWORD,AUTH_SECRET,APP_URL,ENV_FILE_B64,VPS_APP_DIR
          script: |
            set -e
            APP_DIR="${VPS_APP_DIR:-/home/container/Next-Gamifikasi}"
            REPO_URL="git@github.com:agungkurniawanfaisol/App-Gamifikasi.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repo to $APP_DIR ..."
              mkdir -p "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              if [ -n "$ENV_FILE_B64" ]; then
                echo "$ENV_FILE_B64" | base64 -d > .env
                echo "Created .env from ENV_FILE_B64 secret"
              elif [ -n "$MYSQL_ROOT_PASSWORD" ] && [ -n "$MYSQL_PASSWORD" ] && [ -n "$AUTH_SECRET" ] && [ -n "$APP_URL" ]; then
                {
                  echo "# Generated on first deploy by GitHub Actions"
                  echo "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}"
                  echo "MYSQL_DATABASE=gamifikasi"
                  echo "MYSQL_USER=gamifikasi"
                  echo "MYSQL_PASSWORD=${MYSQL_PASSWORD}"
                  echo ""
                  echo "DATABASE_URL=mysql://gamifikasi:${MYSQL_PASSWORD}@mysql:3306/gamifikasi"
                  echo ""
                  echo "AUTH_SECRET=${AUTH_SECRET}"
                  echo "AUTH_URL=${APP_URL}"
                  echo ""
                  echo "NEXTAUTH_SECRET=${AUTH_SECRET}"
                  echo "NEXTAUTH_URL=${APP_URL}"
                  echo ""
                  echo "OLLAMA_BASE_URL=http://ollama:11434"
                  echo "OLLAMA_MODEL=qwen2.5:3b"
                  echo "OLLAMA_KEEP_ALIVE=30m"
                } > .env
                echo "Created .env from deploy secrets"
              else
                echo "ERROR: .env not found and cannot auto-create."
                echo "Add GitHub secrets:"
                echo "  MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD, AUTH_SECRET"
                echo "Or SSH to VPS: cd $APP_DIR && cp .env.example .env && nano .env"
                exit 1
              fi
            fi

            COMPOSE_FILES="-f docker-compose.yml"
            TRAEFIK_CONTAINER=$(docker ps --filter "name=traefik" --format '{{.Names}}' | head -1)
            if [ -n "$TRAEFIK_CONTAINER" ]; then
              TRAEFIK_NET=$(docker inspect "$TRAEFIK_CONTAINER" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}' | head -1)
              if [ -n "$TRAEFIK_NET" ] && docker network inspect "$TRAEFIK_NET" >/dev/null 2>&1; then
                if [ -f docker-compose.traefik.yml ] && grep -q '^TRAEFIK_HOST=' .env 2>/dev/null; then
                  export TRAEFIK_NETWORK="$TRAEFIK_NET"
                  COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.traefik.yml"
                  echo "Traefik detected — using network: $TRAEFIK_NET"
                fi
              fi
            fi

            docker compose $COMPOSE_FILES up --build -d
            docker compose ps
            docker image prune -f
