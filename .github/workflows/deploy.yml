# Deploy runs ON the VPS via a self-hosted runner (outbound connection to GitHub).
# Hostinger often blocks inbound SSH from GitHub cloud IPs even when port 22 is open.
#
# One-time setup on VPS: bash scripts/setup-github-runner.sh
# Fallback without runner: cron + scripts/poll-deploy.sh (every 5 minutes)

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy on VPS
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -e
          APP_DIR="${VPS_APP_DIR:-/home/container/Next-Gamifikasi}"
          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main
          bash scripts/deploy.sh
