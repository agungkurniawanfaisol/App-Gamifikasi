name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        env:
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          KEY_FILE="${GITHUB_WORKSPACE}/deploy_key"
          if [ -n "$SSH_KEY_B64" ]; then
            echo "$SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          elif [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > "$KEY_FILE"
          else
            echo "Missing secret: set SSH_KEY_B64 (recommended) or VPS_SSH_KEY"
            exit 1
          fi
          chmod 600 "$KEY_FILE"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ github.workspace }}/deploy_key
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/opt/Next-Gamifikasi"
            REPO_URL="git@github.com:agungkurniawanfaisol/App-Gamifikasi.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repo to $APP_DIR ..."
              mkdir -p "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: .env not found in $APP_DIR"
              echo "SSH to VPS and run:"
              echo "  cd $APP_DIR && cp .env.example .env && nano .env"
              exit 1
            fi

            docker compose up --build -d
            docker compose ps
            docker image prune -f
