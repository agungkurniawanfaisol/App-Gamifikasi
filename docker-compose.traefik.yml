# =============================================================================
# docker-compose.traefik.yml — Traefik reverse proxy overlay (optional)
# Usage: docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d --build
#
# Hostinger Traefik runs with network_mode: host (no shared Docker network).
# Traefik discovers this container via the Docker socket and routes to its bridge IP.
#
# Do NOT add an HTTP→HTTPS redirect router on entrypoint "web" — it breaks
# Let's Encrypt HTTP-01 (/.well-known/acme-challenge/ returns 404).
# Hostinger Traefik issues the cert via port 80; only route HTTPS here.
#
# Requires:
#   - TRAEFIK_HOST in .env
#   - DNS A record pointing to your VPS
# =============================================================================

services:
  nextjs:
    labels:
      - traefik.enable=true
      - traefik.http.routers.next-gamifikasi.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.next-gamifikasi.entrypoints=websecure
      - traefik.http.routers.next-gamifikasi.tls.certresolver=letsencrypt
      - traefik.http.services.next-gamifikasi.loadbalancer.server.port=5174
